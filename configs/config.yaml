# BioHub Cell Tracking — Main Configuration
# Override with: python scripts/train.py key=value

data:
  root_dir: "D:/kaggle_biohub/biohub-cell-tracking-during-development"
  split: "train"
  voxel_spacing: [1.625, 0.40625, 0.40625]  # Z, Y, X in µm
  matching_tolerance_um: 7.0

detection:
  method: "log"  # "log" or "learned"
  sigma_um_range: [2.0, 3.0, 4.0, 5.0]
  threshold_rel: 0.1
  min_distance_um: 5.0
  exclude_border: 2
  recall_gate: 0.85  # Proceed only if recall >= this

features:
  handcrafted_dim: 32
  crop_embed_dim: 48
  crop_size: [8, 16, 16]
  density_k: 5

graph:
  max_displacement_um: 15.0
  max_frame_gap: 1  # Controlled by curriculum
  k_max: 6
  intensity_ratio_bounds: [0.4, 2.5]
  size_ratio_bounds: [0.4, 2.5]
  velocity_tolerance_um: 12.0
  use_biology_filters: true

model:
  architecture: "edge_mpn"
  hidden_dim: 128
  n_layers: 4
  n_classes: 3
  dropout: 0.1
  use_crops: true

training:
  n_epochs: 50
  batch_size: 1  # Full-graph training (1 graph = 1 sample)
  optimizer:
    type: "adamw"
    lr: 0.0005
    weight_decay: 0.0001
  scheduler:
    type: "cosine_warm_restarts"
    T_0: 10
  loss:
    focal_alpha: [0.1, 0.6, 0.3]
    focal_gamma: 2.0
    w_focal: 1.0
    w_conf: 0.5
    w_sibling: 0.3
  curriculum:
    patience: 5
    min_epochs_per_phase: 8
  hard_negatives:
    hard_ratio: 0.7
    warmup_epochs: 5
  mixed_precision: true
  gradient_clip: 1.0

optimization:
  method: "hungarian"
  min_track_confidence: 0.3
  min_division_confidence: 0.5
  max_displacement_um: 15.0
  min_track_length: 3
  max_daughter_dist_um: 10.0

output:
  dir: "outputs"
  save_best: true
  log_interval: 1
